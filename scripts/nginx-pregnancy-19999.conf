# 产检记录应用 - HTTPS 19999 端口
server {
    listen 19999 ssl;
    listen [::]:19999 ssl;
    server_name heianqishizhisuiyuan.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/heianqishizhisuiyuan.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/heianqishizhisuiyuan.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /var/www/pregnancy-checkup-app/frontend/dist;
    index index.html;

    client_max_body_size 12M;

    # 入口 HTML 不长期缓存，部署后浏览器更容易拉取新版本
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # 前端 SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 图片附件（需 JWT）
    location /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /health {
        proxy_pass http://127.0.0.1:3000;
    }
}
